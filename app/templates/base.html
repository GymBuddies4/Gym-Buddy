<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Workout Remixer{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/favicon.ico') }}">
    <link rel="stylesheet" href="/static/css/app.css">

    {% block external_css %}{% endblock %}
    {% block internal_css %}{% endblock %}
</head>

<body>

    {% if not hide_navbar %}
    <nav class="navbar">
        <a href="/" class="navbar-brand">Workout<span>Remixer</span></a>
        <ul class="navbar-nav">
            <li><a href="/browse" class="nav-link">Browse</a></li>
            <li><a href="/my-workout" class="nav-link">My Workout</a></li>
            <li><a href="/logout" class="nav-link" style="color:#C0392B;">Logout</a></li>
        </ul>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}

    {% block external_js %}{% endblock %}

</body>
</html>
